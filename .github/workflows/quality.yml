---
name: quality

on:
  pull_request:

jobs:
  lint-and-types:
    name: lint-and-types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements_dev.txt
      - name: Lint and type checks
        run: python -m tox -e lint,type

  unit-tests:
    name: unit-tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements_dev.txt
      - name: Unit tests
        run: python -m tox -e py313

  coverage-gate:
    name: coverage-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements_dev.txt
      - name: Phase 3 critical module coverage gate (>=90%)
        env:
          PYTHONPATH: src
        run: >-
          pytest
          --cov=offsite.core.upload
          --cov=offsite.core.apply_sync
          --cov=offsite.core.integrity
          --cov-fail-under=90
          --cov-report=term-missing
          test/test_upload.py
          test/test_apply_sync.py
      - name: Coverage gate (>=85%)
        env:
          PYTHONPATH: src
        run: pytest --cov=src/offsite --cov-report=term-missing --cov-fail-under=85 -q
