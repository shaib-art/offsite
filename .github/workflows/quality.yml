---
name: quality

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-types:
    name: lint-and-types (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements_dev.txt
      - name: Lint and type checks
        run: python -m tox -e lint,type

  unit-tests:
    name: unit-tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements_dev.txt
      - name: Unit tests
        run: python -m tox -e py313

  simulation-tests:
    name: simulation-tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements_dev.txt
      - name: Simulation-style tests
        env:
          PYTHONPATH: src
        run: >-
          pytest -q
          test/test_scan_traversal.py
          test/test_scan_filtering.py
          test/test_snapshot_persistence.py

  coverage-gate:
    name: coverage-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements_dev.txt
      - name: Coverage gate (>=85%)
        env:
          PYTHONPATH: src
        run: pytest --cov=src/offsite --cov-report=term-missing --cov-fail-under=85 -q
